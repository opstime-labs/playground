version: '3.8'

services:
  local_mysql:
    image: mysql:8.4
    container_name: local_mysql_db
    ports:
      - "3306:3306" # Maps MySQL to localhost:3306
    environment:
      MYSQL_ROOT_PASSWORD: root_secure_password # Sets the master root password
      MYSQL_DATABASE: my_store_db               # Custom initial database name
      MYSQL_USER: my_app_user                   # Custom non-root username
      MYSQL_PASSWORD: user_secure_password      # Custom non-root password
    volumes:
      - ./mysql_data:/var/lib/mysql # MySQL specific internal path
restart: always      
# debugging purpose: enable general query logging to a file inside the container
command: --general-log=1 --general-log-file=/var/lib/mysql/query.log

