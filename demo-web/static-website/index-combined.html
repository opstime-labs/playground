<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Tech Demo</title>
  
  <!-- CSS: Controls the styling, layout, and visual design -->
  <style>
    /* Define baseline styling variables */
    :root {
      --bg-color: #f4f7f6;
      --card-bg: #ffffff;
      --text-color: #333333;
      --accent-color: #0070f3;
      --border-color: #e0e0e0;
    }

    /* Target attributes changed by JavaScript for Dark Mode */
    [data-theme="dark"] {
      --bg-color: #1a1a1a;
      --card-bg: #2d2d2d;
      --text-color: #ffffff;
      --accent-color: #00bcd4;
      --border-color: #444444;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      transition: background-color 0.3s, color 0.3s;
    }

    .card {
      background-color: var(--card-bg);
      padding: 2.5rem;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      border: 1px solid var(--border-color);
      text-align: center;
      max-width: 400px;
      transition: background-color 0.3s, border-color 0.3s;
    }

    h1 {
      margin-top: 0;
      font-size: 1.8rem;
    }

    p {
      color: var(--text-color);
      opacity: 0.8;
      line-height: 1.5;
    }

    button {
      background-color: var(--accent-color);
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 6px;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
    }

    button:hover {
      opacity: 0.9;
    }

    button:active {
      transform: scale(0.95);
    }
  </style>
</head>

<body>

  <!-- HTML: Defines the structural elements and raw content -->
  <div class="card">
    <h1>Web Tech Interactive Demo</h1>
    <p>
      <strong>HTML</strong> builds this card layout. <br>
      <strong>CSS</strong> styles the colors, borders, and fonts. <br>
      <strong>JavaScript</strong> powers the button below to toggle themes.
    </p>
    <button id="themeToggle">Switch to Dark Mode</button>
  </div>

  <!-- JavaScript: Directs the logic, user actions, and state changes -->
  <script>
    // 1. Select the HTML button element using its unique ID
    const toggleButton = document.getElementById('themeToggle');

    // 2. Add an event listener to run code whenever the user clicks the button
    toggleButton.addEventListener('click', () => {
      
      // Check if the current theme is dark
      const currentTheme = document.documentElement.getAttribute('data-theme');
      
      if (currentTheme === 'dark') {
        // Switch to Light Mode
        document.documentElement.removeAttribute('data-theme');
        toggleButton.textContent = 'Switch to Dark Mode';
      } else {
        // Switch to Dark Mode
        document.documentElement.setAttribute('data-theme', 'dark');
        toggleButton.textContent = 'Switch to Light Mode';
      }
    });
  </script>

</body>
</html>
