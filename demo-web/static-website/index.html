<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Tech Demo</title>
  
  <!-- Link to external CSS stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="card">
    <h1>Web Tech Interactive Demo</h1>
    <p>
      <strong>HTML</strong> builds this card layout. <br>
      <strong>CSS</strong> styles the colors, borders, and fonts. <br>
      <strong>JavaScript</strong> powers the button below to toggle themes.
    </p>
    <button id="themeToggle">Switch to Dark Mode</button>
  </div>

  <!-- Link to external JavaScript file -->
  <script src="script.js"></script>
</body>
</html>
