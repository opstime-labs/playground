<!-- public/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auth Application</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 300px; }
    input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; margin-top: 10px; }
    button:hover { background: #0056b3; }
    .hidden { display: none; }
    .error { color: red; font-size: 14px; margin-top: 5px; }
    .success { color: green; font-size: 14px; margin-top: 5px; }
    .toggle-link { text-align: center; margin-top: 15px; font-size: 14px; color: #555; }
    .toggle-link a { color: #007bff; text-decoration: none; cursor: pointer; }
  </style>
</head>
<body>

  <!-- AUTH SCREEN (Login & Register Forms) -->
  <div id="authScreen" class="card">
    <h2 id="formTitle">Login</h2>
    <form id="authForm">
      <input type="email" id="email" placeholder="Email Address" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit" id="submitBtn">Sign In</button>
    </form>
    <div id="message" class="error"></div>
    <div class="toggle-link">
      <span id="toggleText">Don't have an account?</span> 
      <a id="toggleAction">Register here</a>
    </div>
  </div>

  <!-- DASHBOARD SCREEN (Shows after successful login) -->
  <div id="dashboardScreen" class="card hidden">
    <h2>Welcome!</h2>
    <p>You are successfully logged in as:</p>
    <strong id="userEmailDisplay"></strong>
    <button id="logoutBtn" style="background: #dc3545;">Log Out</button>
  </div>

  <script src="index.js"></script>
</body>
</html>
